<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font: 16px/1.6 'Segoe UI', -apple-system, sans-serif; background: #f9fafb; color: #374151; display: flex; justify-content: center; padding: 40px 20px; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 12px rgba(0,0,0,.1); padding: 32px; max-width: 500px; width: 100%; }
    .word { font-size: 28px; font-weight: 700; color: #111827; }
    .phonetic { font-size: 16px; color: #6b7280; margin-left: 10px; }
    .audio-btn { border: 1px solid #d1d5db; background: #f9fafb; border-radius: 4px; padding: 4px 10px; cursor: pointer; font-size: 13px; margin-left: 8px; }
    .audio-btn:hover { background: #e5e7eb; }
    .translation { background: #eff6ff; padding: 12px 16px; border-radius: 8px; margin: 16px 0; font-size: 18px; font-weight: 600; color: #1d4ed8; border-left: 4px solid #2563eb; }
    .pos { color: #d97706; font-style: italic; font-size: 14px; margin-top: 12px; font-weight: 600; }
    .def { font-size: 15px; margin: 4px 0; padding-left: 12px; border-left: 2px solid #e5e7eb; }
    .example { font-size: 14px; color: #6b7280; font-style: italic; margin: 2px 0 8px 12px; }
    .syn { font-size: 14px; color: #16a34a; margin-top: 6px; }
    .ant { font-size: 14px; color: #dc2626; margin-top: 4px; }
    .save-btn { margin-top: 20px; width: 100%; padding: 12px; border: none; border-radius: 8px; background: #2563eb; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; }
    .save-btn:hover { background: #1d4ed8; }
    .save-btn:disabled { background: #16a34a; cursor: default; }
    .loading { text-align: center; color: #6b7280; padding: 20px; }
  </style>
</head>
<body>
  <div class="card" id="content"><div class="loading">Loading...</div></div>
  <script src="result.js"></script>
</body>
</html>
