name: Build & Release XPI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run tests
        run: npm test

      - name: Lint & validate
        run: node tools/check.js

      - name: Get version
        id: version
        run: echo "version=$(node -p "JSON.parse(require('fs').readFileSync('manifest.json','utf8')).version")" >> $GITHUB_OUTPUT

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Sign extension
        run: |
          web-ext sign --source-dir=. --artifacts-dir=./artifacts \
            --api-key=${{ secrets.AMO_JWT_ISSUER }} \
            --api-secret=${{ secrets.AMO_JWT_SECRET }} \
            --channel=unlisted
        continue-on-error: true

      - name: Fallback - build unsigned if signing unavailable
        if: ${{ !hashFiles('artifacts/*.xpi') }}
        run: |
          cd /tmp && zip -r $GITHUB_WORKSPACE/artifacts/taptotranslate-${{ steps.version.outputs.version }}.xpi $GITHUB_WORKSPACE \
            -x "$GITHUB_WORKSPACE/.git/*" "$GITHUB_WORKSPACE/node_modules/*" "$GITHUB_WORKSPACE/tests/*" "$GITHUB_WORKSPACE/tools/*" "$GITHUB_WORKSPACE/artifacts/*"
        continue-on-error: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: v${{ steps.version.outputs.version }}
          files: artifacts/*
          generate_release_notes: true
