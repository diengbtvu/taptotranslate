name: Build & Release XPI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run tests
        run: npm test

      - name: Lint & validate
        run: node tools/check.js

      - name: Get version
        id: version
        run: echo "version=$(node -p "JSON.parse(require('fs').readFileSync('manifest.json','utf8')).version")" >> $GITHUB_OUTPUT

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Try signing with AMO
        id: sign
        env:
          AMO_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        if: env.AMO_KEY != ''
        run: |
          web-ext sign \
            --source-dir=. \
            --artifacts-dir=./artifacts \
            --api-key="$AMO_KEY" \
            --api-secret="$AMO_SECRET" \
            --channel=listed \
            --ignore-files tests tools SPEC.md TESTING.md package.json node_modules .git .github artifacts web-ext-artifacts
        continue-on-error: true

      - name: Build unsigned XPI (fallback)
        if: steps.sign.outcome != 'success'
        run: |
          mkdir -p artifacts
          zip -r artifacts/taptotranslate-${{ steps.version.outputs.version }}.xpi . \
            -x ".git/*" ".github/*" "node_modules/*" "tests/*" "tools/*" \
               "SPEC.md" "TESTING.md" "package.json" "package-lock.json" \
               ".gitignore" "artifacts/*" "web-ext-artifacts/*"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: v${{ steps.version.outputs.version }}
          body: |
            Download the `.xpi` file below.
            - If **signed**: install directly in any Firefox
            - If **unsigned**: use Firefox Developer Edition/Nightly (`xpinstall.signatures.required = false`) or load via `about:debugging`
          files: artifacts/*
          generate_release_notes: true
