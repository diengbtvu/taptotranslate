name: Build & Release

on:
  push:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test
      - run: node tools/check.js

  sign:
    name: Sign Extension
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bump version
        id: version
        run: |
          BASE=$(node -p "JSON.parse(require('fs').readFileSync('manifest.json','utf8')).version")
          VER="${BASE}.${{ github.run_number }}"
          node -e "const f='manifest.json';const m=JSON.parse(require('fs').readFileSync(f));m.version='$VER';require('fs').writeFileSync(f,JSON.stringify(m,null,2))"
          echo "version=$VER" >> $GITHUB_OUTPUT

      - run: npm install -g web-ext

      - name: Sign with AMO
        run: |
          web-ext sign \
            --source-dir=. \
            --artifacts-dir=./artifacts \
            --api-key="${{ secrets.AMO_JWT_ISSUER }}" \
            --api-secret="${{ secrets.AMO_JWT_SECRET }}" \
            --channel=listed \
            --amo-metadata=amo-metadata.json \
            --ignore-files tests tools SPEC.md TESTING.md package.json node_modules .git .github artifacts web-ext-artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: signed-xpi
          path: artifacts/*

  release:
    name: Create Release
    needs: sign
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: signed-xpi
          path: artifacts

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.sign.outputs.version }}
          name: v${{ needs.sign.outputs.version }}
          files: artifacts/*
          generate_release_notes: true
