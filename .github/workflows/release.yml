name: Build & Release XPI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run tests
        run: npm test

      - name: Lint & validate
        run: node tools/check.js

      - name: Get version
        id: version
        run: |
          BASE=$(node -p "JSON.parse(require('fs').readFileSync('manifest.json','utf8')).version")
          VER="${BASE}.${{ github.run_number }}"
          node -e "const f='manifest.json';const m=JSON.parse(require('fs').readFileSync(f));m.version='$VER';require('fs').writeFileSync(f,JSON.stringify(m,null,2))"
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Try signing with AMO
        id: sign
        continue-on-error: true
        run: |
          web-ext sign \
            --source-dir=. \
            --artifacts-dir=./artifacts \
            --api-key="${{ secrets.AMO_JWT_ISSUER }}" \
            --api-secret="${{ secrets.AMO_JWT_SECRET }}" \
            --channel=listed \
            --amo-metadata=amo-metadata.json \
            --ignore-files tests tools SPEC.md TESTING.md package.json node_modules .git .github artifacts web-ext-artifacts

      - name: Build unsigned XPI (fallback)
        if: steps.sign.outcome != 'success'
        run: |
          mkdir -p artifacts
          zip -r artifacts/taptotranslate-${{ steps.version.outputs.version }}.xpi . \
            -x ".git/*" ".github/*" "node_modules/*" "tests/*" "tools/*" \
               "SPEC.md" "TESTING.md" "package.json" "package-lock.json" \
               ".gitignore" "artifacts/*" "web-ext-artifacts/*" "amo-metadata.json"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            Download the `.xpi` file.
            - Signed: install in any Firefox
            - Unsigned: Firefox Developer/Nightly with `xpinstall.signatures.required = false`, or `about:debugging`
          files: artifacts/*
          generate_release_notes: true
