name: Build & Release XPI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run tests
        run: npm test

      - name: Lint & validate
        run: node tools/check.js

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Package XPI
        run: |
          zip -r taptotranslate-v${{ steps.version.outputs.version }}.xpi . \
            -x ".git/*" ".github/*" "node_modules/*" "tests/*" "tools/*" \
               "SPEC.md" "TESTING.md" "package.json" "package-lock.json" ".gitignore"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: Release v${{ steps.version.outputs.version }} (build ${{ github.run_number }})
          files: taptotranslate-v${{ steps.version.outputs.version }}.xpi
          generate_release_notes: true
